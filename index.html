<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Livre Brasil - Frete Grátis no mesmo dia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="ml-header">
        <div class="ml-container">
            <div class="ml-top-nav">
                <a href="#" class="ml-logo">
                    <img src="https://http2.mlstatic.com/frontend-assets/ml-web-navigation/ui-navigation/5.21.22/mercadolibre/logo__large_plus.png" alt="Mercado Livre">
                </a>
                <form class="ml-search-bar">
                    <input type="text" placeholder="Buscar produtos, marcas e muito mais...">
                    <button type="submit" class="ml-search-btn">
                        <img src="https://img.icons8.com/ios/20/000000/search--v1.png" alt="Buscar">
                    </button>
                </form>
                <div class="ml-promo-video">
                    <img src="https://http2.mlstatic.com/resources/frontend/statics/ml-u-s-assets/mkt/pwa/videos/disney-level-6-v2.png" alt="Meli Plus">
                </div>
            </div>

            <div class="ml-bottom-nav">
                <div class="ml-location">
                    <img src="https://img.icons8.com/ios/18/000000/marker.png" alt="Local">
                    <div>
                        <span class="send-to">Enviar para</span>
                        <span class="city">Brasil</span>
                    </div>
                </div>
                <nav class="ml-menu">
                    <ul>
                        <li><a href="#">Categorias</a></li>
                        <li><a href="#">Ofertas</a></li>
                        <li><a href="#">Histórico</a></li>
                        <li><a href="#">Supermercado</a></li>
                        <li><a href="#">Moda</a></li>
                        <li><a href="#">Vender</a></li>
                        <li><a href="#">Contato</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="ml-main">
        <section class="ml-hero">
            <div class="ml-container">
                <img src="https://http2.mlstatic.com/D_NQ_938171-MLA74838634591_032024-OO.webp" alt="Banner Ofertas">
            </div>
        </section>

        <section class="ml-products-section">
            <div class="ml-container">
                <h2 class="ml-title">Baseado no que você viu recentemente</h2>
                <div class="ml-grid" id="product-grid">
                    </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
